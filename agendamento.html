<section class="form-section">
    <link rel="stylesheet" href="css/stylecopy.css">
    <h2>Dados do agendamento</h2>

    <form method="POST" class="form-card">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
             
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" required pattern="[0-9]{8,}">

        <label for="especie">Especie:</label>
        <input type="text" id="especie" name="especie" required >

        <label for="data">Data de agendamento:</label>
        <input type="date" id="agendamento" name="agendamento" required >
    
        <label for="horario">Horario de agendamento:</label>
        <input type="time" id="horario" name="horario" required >
        

        <button type="submit">Agendar</button>
    </form>
    <div class="container">

        <img src="img/vetke.jpeg"width="600">
        </div>
    </div>
